syntax = "proto3";

package glossary;

service GlossaryService {
  rpc ListTerms (Empty) returns (TermNames);
  rpc GetTerm (TermNameRequest) returns (TermResponse);
  rpc CreateTerm (TermCreateRequest) returns (TermResponse);
  rpc UpdateTerm (TermUpdateRequest) returns (TermResponse);
  rpc DeleteTerm (TermNameRequest) returns (DeleteResponse);
}

message Empty {}

message TermNameRequest {
  string name = 1;
}

message TermNames {
  repeated string names = 1;
}

message TermResponse {
  string name = 1;
  string description = 2;
  bool found = 3;
  string error = 4;
}

message TermCreateRequest {
  string name = 1;
  string description = 2;
}

message TermUpdateRequest {
  string current_name = 1;
  string new_name = 2;
  string new_description = 3;
}

message DeleteResponse {
  bool ok = 1;
  string error = 2;
}
